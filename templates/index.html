<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="window.location.href='https://example.com'">⭐ 评价</button>
            <button class="control-btn" onclick="window.location.href='https://example.com'">f 分享</button>
            <button class="control-btn" onclick="resetGame()">🔄 重新开始</button>
            <button class="control-btn" onclick="window.location.reload()">🔄 重置</button>
        </div>
        
        <div class="game-container">
            <div class="game-board" id="game-board">
                <!-- 4x4 网格将由 JavaScript 生成 -->
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
